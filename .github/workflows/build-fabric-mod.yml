name: Build QuickShulker Fabric Mod

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'quickshulker 分支/tag (默认 1.21)'
        default: '1.21'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout quickshulker
        uses: actions/checkout@v4
        with:
          repository: Haocen2004/quickshulker
          ref: ${{ github.event.inputs.ref || '1.21' }}
          path: quickshulker

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Apply modifications to ItemMixin.java
        run: |
          cat << 'PYEOF' > /tmp/patch.py
          with open('src/main/java/net/kyrptonaught/quickshulker/mixin/ItemMixin.java', 'r') as f:
              content = f.read()

          # ── 修改 1: onClicked — bundle 插入 ──
          old1 = (
              'if (BundleHelper.shouldAttemptBundle(player, clickType, hostStack, insertStack, QuickShulkerMod.getConfig().supportsBundlingInsert)) {\n'
              '            if (!player.getWorld().isClient) {\n'
              '                BundleHelper.bundleItemIntoStack(player, hostStack, insertStack, cir);\n'
              '            } else if (slot.inventory instanceof PlayerInventory && ClientUtil.isCreativeScreen(player)) {//stupid creative menu shiz\n'
              '                QuickBundlePacket.sendPacket(ClientUtil.getPlayerInvSlot(player.currentScreenHandler, slot), insertStack);\n'
              '                BundleHelper.bundleItemIntoStack(player, hostStack, insertStack, cir);\n'
              '            }\n'
              '        }'
          )
          new1 = (
              'if (BundleHelper.shouldAttemptBundle(player, clickType, hostStack, insertStack, QuickShulkerMod.getConfig().supportsBundlingInsert)) {\n'
              '            if (player.getWorld().isClient) {\n'
              '                if (slot.inventory instanceof PlayerInventory) {\n'
              '                    QuickBundlePacket.sendPacket(ClientUtil.getPlayerInvSlot(player.currentScreenHandler, slot), insertStack);\n'
              '                }\n'
              '            } else {\n'
              '                BundleHelper.bundleItemIntoStack(player, hostStack, insertStack, cir);\n'
              '            }\n'
              '        }'
          )

          # ── 修改 2: onStackClicked — bundleHeld ──
          old2 = (
              'if (BundleHelper.shouldAttemptBundle(player, clickType, hostStack, insertStack, QuickShulkerMod.getConfig().supportsBundlingPickup)) {//bundle stack into held item\n'
              '            if (!player.getWorld().isClient) {\n'
              '                BundleHelper.bundleItemIntoStack(player, hostStack, insertStack, cir);\n'
              '                slot.onTakeItem(player, insertStack);\n'
              '            } else if (slot.inventory instanceof PlayerInventory && ClientUtil.isCreativeScreen(player)) { //stupid creative menu shiz\n'
              '                QuickBundlePacket.BundleIntoHeld.sendPacket(insertStack, hostStack);\n'
              '                BundleHelper.bundleItemIntoStack(player, hostStack, insertStack, cir);\n'
              '                QuickBundlePacket.sendCreativeSlotUpdate(insertStack, slot);\n'
              '            }\n'
              '        }'
          )
          new2 = (
              'if (BundleHelper.shouldAttemptBundle(player, clickType, hostStack, insertStack, QuickShulkerMod.getConfig().supportsBundlingPickup)) {//bundle stack into held item\n'
              '            if (player.getWorld().isClient) {\n'
              '                if (slot.inventory instanceof PlayerInventory) {\n'
              '                    QuickBundlePacket.BundleIntoHeld.sendPacket(insertStack, hostStack);\n'
              '                }\n'
              '            } else {\n'
              '                BundleHelper.bundleItemIntoStack(player, hostStack, insertStack, cir);\n'
              '                slot.onTakeItem(player, insertStack);\n'
              '            }\n'
              '        }'
          )

          # ── 修改 3: onStackClicked — unbundle ──
          old3 = (
              'else if (BundleHelper.shouldAttemptUnBundle(player, clickType, hostStack, insertStack, QuickShulkerMod.getConfig().supportsBundlingExtract)) {//unbundle held stack into slot\n'
              '            if (!slot.canInsert(ItemStack.EMPTY)) return;\n'
              '            if (!player.getWorld().isClient) {\n'
              '                BundleHelper.unbundleStackIntoSlot(player, hostStack, slot, cir);\n'
              '            } else if (slot.inventory instanceof PlayerInventory && ClientUtil.isCreativeScreen(player)) { //stupid creative menu shiz\n'
              '                QuickBundlePacket.UnBundlePacket.sendPacket(ClientUtil.getPlayerInvSlot(player.currentScreenHandler, slot), hostStack);\n'
              '                BundleHelper.unbundleStackIntoSlot(player, hostStack, slot, cir);\n'
              '            }\n'
              '        }'
          )
          new3 = (
              'else if (BundleHelper.shouldAttemptUnBundle(player, clickType, hostStack, insertStack, QuickShulkerMod.getConfig().supportsBundlingExtract)) {//unbundle held stack into slot\n'
              '            if (!slot.canInsert(ItemStack.EMPTY)) return;\n'
              '            if (player.getWorld().isClient) {\n'
              '                if (slot.inventory instanceof PlayerInventory) {\n'
              '                    QuickBundlePacket.UnBundlePacket.sendPacket(ClientUtil.getPlayerInvSlot(player.currentScreenHandler, slot), hostStack);\n'
              '                }\n'
              '            } else {\n'
              '                BundleHelper.unbundleStackIntoSlot(player, hostStack, slot, cir);\n'
              '            }\n'
              '        }'
          )

          for old, new, desc in [(old1, new1, 'onClicked'), (old2, new2, 'onStackClicked-bundleHeld'), (old3, new3, 'onStackClicked-unbundle')]:
              if old not in content:
                  print(f'ERROR: Could not find target block for {desc}')
                  exit(1)
              content = content.replace(old, new, 1)
              print(f'✓ Patched {desc}')

          with open('src/main/java/net/kyrptonaught/quickshulker/mixin/ItemMixin.java', 'w') as f:
              f.write(content)

          print('✓ All patches applied')
          PYEOF
          python3 /tmp/patch.py
        working-directory: quickshulker

      - name: Build with Gradle
        run: chmod +x gradlew && rm -rf .gradle/loom-cache && ./gradlew build --no-daemon
        working-directory: quickshulker

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quickshulker-modified
          path: quickshulker/build/libs/*.jar
